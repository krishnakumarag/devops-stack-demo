---
- name: Provision app server
  hosts: appservers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Java 21
      apt:
        name: openjdk-21-jdk
        state: present

    - name: Install curl
      apt:
        name: curl
        state: present

    - name: Verify Java installation
      command: java -version
      register: java_version

    - name: Print Java version
      debug:
        msg: "{{ java_version.stderr }}"